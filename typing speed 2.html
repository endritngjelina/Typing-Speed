<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster Pro - Typing Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            color: white;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .text-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            font-size: 1.3em;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            border: 2px solid #e9ecef;
            position: relative;
            overflow: hidden;
        }

        .text-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .text-display.active::before {
            transform: translateX(0);
        }

        .char {
            position: relative;
            transition: all 0.1s ease;
        }

        .char.correct {
            background: #d4edda;
            color: #155724;
        }

        .char.incorrect {
            background: #f8d7da;
            color: #721c24;
            animation: shake 0.3s ease-in-out;
        }

        .char.current {
            background: #007bff;
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-area {
            position: relative;
            margin-bottom: 20px;
        }

        .typing-input {
            width: 100%;
            padding: 20px;
            font-size: 1.2em;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #f8f9fa, #ffffff);
        }

        .typing-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .typing-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);
        }

        .results {
            display: none;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }

        .results.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .result-value {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .result-label {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .difficulty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .typing-animation {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            opacity: 0.5;
            animation: typing 2s infinite;
        }

        @keyframes typing {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .achievements {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .achievement {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ffd700, #ffed4a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .achievement.unlocked {
            opacity: 1;
            transform: scale(1.1);
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.3); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .title {
                font-size: 2em;
            }
            
            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }
            
            .text-display {
                font-size: 1.1em;
                padding: 20px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">TypeMaster Pro</h1>
            <p class="subtitle">Professional Typing Speed Assessment</p>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="wpm">0</span>
                <span class="stat-label">WPM</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="accuracy">100%</span>
                <span class="stat-label">Accuracy</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="time">60</span>
                <span class="stat-label">Time</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="errors">0</span>
                <span class="stat-label">Errors</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="text-display" id="textDisplay">
            <div class="typing-animation">⌨️</div>
        </div>

        <div class="input-area">
            <input type="text" class="typing-input" id="typingInput" placeholder="Click here and start typing when ready..." disabled>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Start Test</button>
            <button class="btn btn-secondary" id="resetBtn">Reset</button>
        </div>

        <div class="results" id="results">
            <h2>Test Complete! 🎉</h2>
            <div class="results-grid">
                <div class="result-card">
                    <span class="result-value" id="finalWpm">0</span>
                    <span class="result-label">Words Per Minute</span>
                </div>
                <div class="result-card">
                    <span class="result-value" id="finalAccuracy">100%</span>
                    <span class="result-label">Accuracy</span>
                </div>
                <div class="result-card">
                    <span class="result-value" id="finalErrors">0</span>
                    <span class="result-label">Total Errors</span>
                </div>
                <div class="result-card">
                    <span class="result-value" id="finalCharacters">0</span>
                    <span class="result-label">Characters Typed</span>
                </div>
            </div>
            <div class="achievements">
                <div class="achievement" id="speedAchievement" title="Speed Demon: 60+ WPM">🚀</div>
                <div class="achievement" id="accuracyAchievement" title="Perfectionist: 95%+ Accuracy">🎯</div>
                <div class="achievement" id="enduranceAchievement" title="Endurance: Complete without stopping">💪</div>
            </div>
        </div>
    </div>

    <script>
        class TypingTest {
            constructor() {
                this.texts = {
                    easy: [
                        "The quick brown fox jumps over the lazy dog near the old oak tree.",
                        "A journey of a thousand miles begins with a single step forward.",
                        "Practice makes perfect when you work hard every single day.",
                        "The sun rises in the east and sets in the west every day."
                    ],
                    medium: [
                        "Technology has revolutionized the way we communicate, work, and live our daily lives in the modern world.",
                        "Success is not final, failure is not fatal: it is the courage to continue that counts in life.",
                        "The future belongs to those who believe in the beauty of their dreams and work towards them.",
                        "Innovation distinguishes between a leader and a follower in today's competitive business environment."
                    ],
                    hard: [
                        "Artificial intelligence and machine learning algorithms are transforming industries across the globe at an unprecedented pace.",
                        "The complexity of quantum computing presents both extraordinary opportunities and significant challenges for researchers.",
                        "Cybersecurity professionals must constantly adapt to evolving threats in our interconnected digital infrastructure.",
                        "Biotechnology advances promise revolutionary treatments for diseases that have plagued humanity for centuries."
                    ]
                };
                
                this.currentText = '';
                this.currentIndex = 0;
                this.startTime = null;
                this.endTime = null;
                this.isTestActive = false;
                this.errors = 0;
                this.totalTyped = 0;
                this.difficulty = 'easy';
                this.testDuration = 60;
                this.timer = null;
                this.timeLeft = 60;
                
                this.initializeElements();
                this.bindEvents();
                this.loadNewText();
            }
            
            initializeElements() {
                this.textDisplay = document.getElementById('textDisplay');
                this.typingInput = document.getElementById('typingInput');
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.results = document.getElementById('results');
                this.progressFill = document.getElementById('progressFill');
                
                // Stats elements
                this.wpmElement = document.getElementById('wpm');
                this.accuracyElement = document.getElementById('accuracy');
                this.timeElement = document.getElementById('time');
                this.errorsElement = document.getElementById('errors');
                
                // Results elements
                this.finalWpm = document.getElementById('finalWpm');
                this.finalAccuracy = document.getElementById('finalAccuracy');
                this.finalErrors = document.getElementById('finalErrors');
                this.finalCharacters = document.getElementById('finalCharacters');
                
                // Achievement elements
                this.speedAchievement = document.getElementById('speedAchievement');
                this.accuracyAchievement = document.getElementById('accuracyAchievement');
                this.enduranceAchievement = document.getElementById('enduranceAchievement');
                
                // Difficulty buttons
                this.difficultyBtns = document.querySelectorAll('.difficulty-btn');
            }
            
            bindEvents() {
                this.startBtn.addEventListener('click', () => this.startTest());
                this.resetBtn.addEventListener('click', () => this.resetTest());
                this.typingInput.addEventListener('input', (e) => this.handleInput(e));
                this.typingInput.addEventListener('keydown', (e) => this.handleKeyDown(e));
                
                this.difficultyBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeDifficulty(e.target.dataset.difficulty));
                });
                
                // Prevent paste
                this.typingInput.addEventListener('paste', (e) => e.preventDefault());
            }
            
            changeDifficulty(difficulty) {
                if (this.isTestActive) return;
                
                this.difficulty = difficulty;
                this.difficultyBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[data-difficulty="${difficulty}"]`).classList.add('active');
                this.loadNewText();
            }
            
            loadNewText() {
                const texts = this.texts[this.difficulty];
                this.currentText = texts[Math.floor(Math.random() * texts.length)];
                this.displayText();
            }
            
            displayText() {
                this.textDisplay.innerHTML = this.currentText
                    .split('')
                    .map((char, index) => `<span class="char" data-index="${index}">${char}</span>`)
                    .join('') + '<div class="typing-animation">⌨️</div>';
            }
            
            startTest() {
                this.isTestActive = true;
                this.startTime = Date.now();
                this.timeLeft = this.testDuration;
                this.currentIndex = 0;
                this.errors = 0;
                this.totalTyped = 0;
                
                this.typingInput.disabled = false;
                this.typingInput.focus();
                this.startBtn.textContent = 'Test in Progress...';
                this.startBtn.disabled = true;
                this.textDisplay.classList.add('active');
                this.results.classList.remove('show');
                
                this.updateCurrentCharacter();
                this.startTimer();
            }
            
            startTimer() {
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.timeElement.textContent = this.timeLeft;
                    
                    if (this.timeLeft <= 0) {
                        this.endTest();
                    }
                }, 1000);
            }
            
            handleInput(e) {
                if (!this.isTestActive) return;
                
                const inputValue = e.target.value;
                const inputLength = inputValue.length;
                
                // Prevent typing beyond text length
                if (inputLength > this.currentText.length) {
                    e.target.value = inputValue.substring(0, this.currentText.length);
                    return;
                }
                
                this.totalTyped = Math.max(this.totalTyped, inputLength);
                this.updateCharacterStates(inputValue);
                this.updateStats();
                
                // Check if test is complete
                if (inputLength === this.currentText.length && inputValue === this.currentText) {
                    this.endTest();
                }
            }
            
            handleKeyDown(e) {
                if (!this.isTestActive) return;
                
                // Handle backspace
                if (e.key === 'Backspace') {
                    this.currentIndex = Math.max(0, this.typingInput.value.length - 1);
                    this.updateCurrentCharacter();
                }
            }
            
            updateCharacterStates(inputValue) {
                const chars = document.querySelectorAll('.char');
                let currentErrors = 0;
                
                chars.forEach((char, index) => {
                    char.classList.remove('correct', 'incorrect', 'current');
                    
                    if (index < inputValue.length) {
                        if (inputValue[index] === this.currentText[index]) {
                            char.classList.add('correct');
                        } else {
                            char.classList.add('incorrect');
                            currentErrors++;
                        }
                    } else if (index === inputValue.length) {
                        char.classList.add('current');
                    }
                });
                
                this.errors = currentErrors;
                this.currentIndex = inputValue.length;
                this.updateProgress();
            }
            
            updateCurrentCharacter() {
                const chars = document.querySelectorAll('.char');
                chars.forEach(char => char.classList.remove('current'));
                
                if (this.currentIndex < chars.length) {
                    chars[this.currentIndex].classList.add('current');
                }
            }
            
            updateProgress() {
                const progress = (this.currentIndex / this.currentText.length) * 100;
                this.progressFill.style.width = `${progress}%`;
            }
            
            updateStats() {
                const timeElapsed = (Date.now() - this.startTime) / 1000 / 60; // in minutes
                const wordsTyped = this.currentIndex / 5; // standard: 5 characters = 1 word
                const wpm = Math.round(wordsTyped / timeElapsed) || 0;
                const accuracy = this.totalTyped > 0 ? Math.round(((this.totalTyped - this.errors) / this.totalTyped) * 100) : 100;
                
                this.wpmElement.textContent = wpm;
                this.accuracyElement.textContent = `${accuracy}%`;
                this.errorsElement.textContent = this.errors;
                
                // Add visual feedback for good performance
                if (wpm >= 60) {
                    this.wpmElement.style.color = '#28a745';
                } else if (wpm >= 40) {
                    this.wpmElement.style.color = '#ffc107';
                } else {
                    this.wpmElement.style.color = '#dc3545';
                }
                
                if (accuracy >= 95) {
                    this.accuracyElement.style.color = '#28a745';
                } else if (accuracy >= 85) {
                    this.accuracyElement.style.color = '#ffc107';
                } else {
                    this.accuracyElement.style.color = '#dc3545';
                }
            }
            
            endTest() {
                this.isTestActive = false;
                this.endTime = Date.now();
                clearInterval(this.timer);
                
                this.typingInput.disabled = true;
                this.startBtn.textContent = 'Start Test';
                this.startBtn.disabled = false;
                this.textDisplay.classList.remove('active');
                
                this.showResults();
            }
            
            showResults() {
                const timeElapsed = (this.endTime - this.startTime) / 1000 / 60;
                const wordsTyped = this.currentIndex / 5;
                const wpm = Math.round(wordsTyped / timeElapsed) || 0;
                const accuracy = this.totalTyped > 0 ? Math.round(((this.totalTyped - this.errors) / this.totalTyped) * 100) : 100;
                
                this.finalWpm.textContent = wpm;
                this.finalAccuracy.textContent = `${accuracy}%`;
                this.finalErrors.textContent = this.errors;
                this.finalCharacters.textContent = this.totalTyped;
                
                this.results.classList.add('show');
                this.checkAchievements(wpm, accuracy);
            }
            
            checkAchievements(wpm, accuracy) {
                // Reset achievements
                document.querySelectorAll('.achievement').forEach(a => a.classList.remove('unlocked'));
                
                setTimeout(() => {
                    if (wpm >= 60) {
                        this.speedAchievement.classList.add('unlocked');
                    }
                    
                    if (accuracy >= 95) {
                        this.accuracyAchievement.classList.add('unlocked');
                    }
                    
                    if (this.currentIndex === this.currentText.length) {
                        this.enduranceAchievement.classList.add('unlocked');
                    }
                }, 500);
            }
            
            resetTest() {
                this.isTestActive = false;
                clearInterval(this.timer);
                
                this.currentIndex = 0;
                this.errors = 0;
                this.totalTyped = 0;
                this.timeLeft = this.testDuration;
                this.startTime = null;
                this.endTime = null;
                
                this.typingInput.value = '';
                this.typingInput.disabled = true;
                this.startBtn.textContent = 'Start Test';
                this.startBtn.disabled = false;
                this.textDisplay.classList.remove('active');
                this.results.classList.remove('show');
                
                this.timeElement.textContent = this.testDuration;
                this.wpmElement.textContent = '0';
                this.accuracyElement.textContent = '100%';
                this.errorsElement.textContent = '0';
                this.progressFill.style.width = '0%';
                
                // Reset stat colors
                this.wpmElement.style.color = '';
                this.accuracyElement.style.color = '';
                
                this.loadNewText();
            }
        }
        
        // Initialize the typing test when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new TypingTest();
        });
    </script>
</body>
</html>
