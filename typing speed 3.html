<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeFlow Pro - Advanced Typing Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 1100px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: float 20s infinite linear;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .difficulty-btn.active {
            background: linear-gradient(45deg, #3498db, #2980b9);
            border-color: #3498db;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .game-mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .mode-btn.active {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .stat-card:hover::before {
            opacity: 1;
            transform: rotate(45deg) translate(50%, 50%);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .text-container {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 1.3rem;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.1);
            min-height: 120px;
        }

        .text-to-type {
            font-family: 'SF Mono', Consolas, monospace;
            position: relative;
            z-index: 1;
            user-select: none;
        }

        .char {
            position: relative;
            transition: all 0.2s ease;
            border-radius: 3px;
            padding: 1px 2px;
            margin: 0 1px;
        }

        .char.correct {
            background: rgba(46, 204, 113, 0.3);
            color: #27ae60;
            transform: scale(1.05);
        }

        .char.incorrect {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            animation: shake 0.5s ease-in-out;
        }

        .char.current {
            background: #3498db;
            color: white;
            animation: pulse 1s infinite;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.7);
        }

        .char.missed {
            background: rgba(241, 196, 15, 0.3);
            color: #f39c12;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .input-container {
            position: relative;
            margin-bottom: 30px;
        }

        .typing-input {
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-family: 'SF Mono', Consolas, monospace;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .typing-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
            transform: scale(1.02);
        }

        .typing-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            min-width: 120px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .sound-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sound-btn {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .sound-btn.active {
            background: linear-gradient(45deg, #9b59b6, #8e44ad);
            border-color: #9b59b6;
        }

        .results {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        .results.show {
            display: block;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .achievement-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: all 0.5s ease;
            z-index: 1000;
            font-weight: 600;
        }

        .achievement-notification.show {
            transform: translateX(0);
        }

        .combo-display {
            position: absolute;
            top: 10px;
            right: 20px;
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
            transform: scale(1);
        }

        .wpm-chart {
            width: 100%;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .chart-line {
            stroke: #3498db;
            stroke-width: 3;
            fill: none;
            filter: drop-shadow(0 0 5px rgba(52, 152, 219, 0.5));
        }

        .chart-area {
            fill: rgba(52, 152, 219, 0.1);
        }

        .floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float-particle 15s infinite linear;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }

        .leaderboard {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .leaderboard-entry:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: 700;
            color: #f39c12;
            min-width: 30px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 20px;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .text-container {
                font-size: 1.1rem;
                padding: 20px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-particles"></div>
    <div class="achievement-notification" id="achievementNotification"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="logo">TypeFlow Pro</h1>
            <p class="subtitle">Master the art of speed and precision</p>
            
            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
                <button class="difficulty-btn" data-difficulty="medium">Medium</button>
                <button class="difficulty-btn" data-difficulty="hard">Hard</button>
                <button class="difficulty-btn" data-difficulty="expert">Expert</button>
            </div>

            <div class="game-mode-selector">
                <button class="mode-btn active" data-mode="time">Time Challenge</button>
                <button class="mode-btn" data-mode="words">Word Sprint</button>
                <button class="mode-btn" data-mode="marathon">Marathon</button>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timer">60</div>
                <div class="stat-label">Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="wordsTyped">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="combo-display" id="comboDisplay">Perfect Streak: 0</div>
        </div>

        <div class="text-container">
            <div class="text-to-type" id="textToType"></div>
        </div>

        <div class="input-container">
            <input type="text" class="typing-input" id="typingInput" placeholder="Click here and start typing..." disabled>
        </div>

        <div class="sound-controls">
            <button class="sound-btn active" id="soundToggle">🔊 Sound</button>
            <button class="sound-btn" id="themeToggle">🌙 Dark Mode</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Start Test</button>
            <button class="btn btn-secondary" id="pauseBtn">Pause</button>
            <button class="btn btn-secondary" id="resetBtn">Reset</button>
            <button class="btn btn-success" id="shareBtn">Share Score</button>
        </div>

        <div class="wpm-chart" id="wpmChart">
            <svg width="100%" height="100%" viewBox="0 0 400 150">
                <defs>
                    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#3498db;stop-opacity:0" />
                    </linearGradient>
                </defs>
                <path class="chart-area" id="chartArea" d="M0,150 L0,150 L400,150 Z" fill="url(#chartGradient)"/>
                <path class="chart-line" id="chartLine" d="M0,150"/>
            </svg>
        </div>

        <div class="results" id="results">
            <h2>Test Complete! 🎉</h2>
            <div class="results-grid">
                <div class="result-card">
                    <div class="result-value" id="finalWpm">0</div>
                    <div class="result-label">WPM</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="finalAccuracy">100%</div>
                    <div class="result-label">Accuracy</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="finalWords">0</div>
                    <div class="result-label">Words</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="finalStreak">0</div>
                    <div class="result-label">Best Streak</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="finalLevel">1</div>
                    <div class="result-label">Level</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="finalRank">-</div>
                    <div class="result-label">Rank</div>
                </div>
            </div>
            <p id="performanceMessage">Excellent typing performance!</p>
        </div>

        <div class="leaderboard" id="leaderboard">
            <h3>Personal Best Scores</h3>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <script>
        class TypingSpeedTest {
            constructor() {
                this.sentences = {
                    easy: [
                        "The quick brown fox jumps over the lazy dog.",
                        "She sells seashells by the seashore.",
                        "A cat in the hat sat on a mat.",
                        "The sun shines bright in the blue sky.",
                        "Birds fly high above the green trees."
                    ],
                    medium: [
                        "Programming is the art of telling another human what one wants the computer to do.",
                        "The only way to do great work is to love what you do every single day.",
                        "Innovation distinguishes between a leader and a follower in modern technology.",
                        "Design is not just what it looks like and feels like, design is how it works.",
                        "Technology is best when it brings people together and solves real problems."
                    ],
                    hard: [
                        "Debugging is twice as hard as writing the code in the first place, so if you write the code as cleverly as possible, you are, by definition, not smart enough to debug it.",
                        "The computer was born to solve problems that did not exist before programming and software development began.",
                        "Every great developer you know got there by solving problems they were unqualified to solve until they actually did it.",
                        "Code is like humor: when you have to explain it, it is bad programming and needs improvement.",
                        "The best error message is the one that never shows up because the code was written correctly."
                    ],
                    expert: [
                        "Simplicity is the ultimate sophistication in software development, requiring deep understanding of complex systems to create elegant solutions.",
                        "The most dangerous phrase in the language is: 'We have always done it this way,' especially in rapidly evolving technology fields.",
                        "Perfection is achieved not when there is nothing more to add, but when there is nothing left to take away from the implementation.",
                        "The real problem is not whether machines think, but whether men do, particularly when designing human-computer interaction systems.",
                        "Any fool can write code that a computer can understand; good programmers write code that humans can understand and maintain."
                    ]
                };
                
                this.currentSentence = '';
                this.currentIndex = 0;
                this.startTime = null;
                this.isActive = false;
                this.isPaused = false;
                this.timer = null;
                this.timeLeft = 60;
                this.correctChars = 0;
                this.totalChars = 0;
                this.errors = 0;
                this.wordsTyped = 0;
                this.streak = 0;
                this.bestStreak = 0;
                this.level = 1;
                this.difficulty = 'easy';
                this.gameMode = 'time';
                this.soundEnabled = true;
                this.darkMode = false;
                this.wpmHistory = [];
                this.achievements = [];
                this.personalBests = JSON.parse(localStorage.getItem('typingBests') || '[]');
                
                this.initElements();
                this.initEventListeners();
                this.generateParticles();
                this.loadNewSentence();
                this.updateLeaderboard();
                this.createAudioContext();
            }

            initElements() {
                this.textDisplay = document.getElementById('textToType');
                this.typingInput = document.getElementById('typingInput');
                this.startBtn = document.getElementById('startBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.shareBtn = document.getElementById('shareBtn');
                this.wpmDisplay = document.getElementById('wpm');
                this.accuracyDisplay = document.getElementById('accuracy');
                this.timerDisplay = document.getElementById('timer');
                this.wordsDisplay = document.getElementById('wordsTyped');
                this.streakDisplay = document.getElementById('streak');
                this.levelDisplay = document.getElementById('level');
                this.progressFill = document.getElementById('progressFill');
                this.comboDisplay = document.getElementById('comboDisplay');
                this.results = document.getElementById('results');
                this.achievementNotification = document.getElementById('achievementNotification');
                this.chartLine = document.getElementById('chartLine');
                this.chartArea = document.getElementById('chartArea');
                this.leaderboard = document.getElementById('leaderboard');
                this.leaderboardList = document.getElementById('leaderboardList');
                this.soundToggle = document.getElementById('soundToggle');
                this.themeToggle = document.getElementById('themeToggle');
            }

            initEventListeners() {
                this.startBtn.addEventListener('click', () => this.startTest());
                this.pauseBtn.addEventListener('click', () => this.pauseTest());
                this.resetBtn.addEventListener('click', () => this.resetTest());
                this.shareBtn.addEventListener('click', () => this.shareScore());
                this.typingInput.addEventListener('input', (e) => this.handleTyping(e));
                this.typingInput.addEventListener('keydown', (e) => this.handleKeyDown(e));
                this.soundToggle.addEventListener('click', () => this.toggleSound());
                this.themeToggle.addEventListener('click', () => this.toggleTheme());
                
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeDifficulty(e.target.dataset.difficulty));
                });
                
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeGameMode(e.target.dataset.mode));
                });
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !this.isActive) {
                        this.startTest();
                    }
                    if (e.key === 'Escape' && this.isActive) {
                        this.pauseTest();
                    }
                });
                
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && this.isActive && !this.isPaused) {
                        this.pauseTest();
                    }
                });
            }

            createAudioContext() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.sounds = {
                    correct: this.createTone(800, 0.1),
                    incorrect: this.createTone(400, 0.2),
                    complete: this.createTone(1200, 0.3),
                    achievement: this.createTone(1000, 0.5)
                };
            }

            createTone(frequency, duration) {
                return () => {
                    if (!this.soundEnabled) return;
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.value = frequency;
                    gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + duration);
                };
            }

            generateParticles() {
                const particlesContainer = document.querySelector('.floating-particles');
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 15 + 's';
                    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                    particlesContainer.appendChild(particle);
                }
            }

            changeDifficulty(newDifficulty) {
                if (this.isActive) return;
                
                this.difficulty = newDifficulty;
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.difficulty === newDifficulty);
                });
                
                this.loadNewSentence();
                this.updateTimeByDifficulty();
            }

            changeGameMode(newMode) {
                if (this.isActive) return;
                
                this.gameMode = newMode;
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === newMode);
                });
                
                this.updateModeSettings();
            }

            updateModeSettings() {
                switch (this.gameMode) {
                    case 'time':
                        this.timeLeft = 60;
                        this.timerDisplay.textContent = '60';
                        break;
                    case 'words':
                        this.timeLeft = 120;
                        this.timerDisplay.textContent = '120';
                        break;
                    case 'marathon':
                        this.timeLeft = 300;
                        this.timerDisplay.textContent = '300';
                        break;
                }
            }

            updateTimeByDifficulty() {
                const timeMultipliers = { easy: 1, medium: 1.2, hard: 1.5, expert: 2 };
                const baseTime = this.gameMode === 'time' ? 60 : this.gameMode === 'words' ? 120 : 300;
                this.timeLeft = Math.floor(baseTime * timeMultipliers[this.difficulty]);
                this.timerDisplay.textContent = this.timeLeft;
            }

            loadNewSentence() {
                const sentences = this.sentences[this.difficulty];
                this.currentSentence = sentences[Math.floor(Math.random() * sentences.length)];
                this.displayText();
                this.currentIndex = 0;
                this.updateProgress();
            }

            displayText() {
                this.textDisplay.innerHTML = this.currentSentence
                    .split('')
                    .map((char, index) => `<span class="char" data-index="${index}">${char}</span>`)
                    .join('');
            }

            startTest() {
                this.isActive = true;
                this.isPaused = false;
                this.startTime = Date.now();
                this.typingInput.disabled = false;
                this.typingInput.focus();
                this.startBtn.textContent = 'Testing...';
                this.startBtn.disabled = true;
                this.pauseBtn.disabled = false;
                this.results.classList.remove('show');
                this.startTimer();
                this.startWPMTracking();
            }

            pauseTest() {
                if (!this.isActive) return;
                
                this.isPaused = !this.isPaused;
                
                if (this.isPaused) {
                    clearInterval(this.timer);
                    clearInterval(this.wpmTimer);
                    this.typingInput.disabled = true;
                    this.pauseBtn.textContent = 'Resume';
                    this.showAchievement('Test Paused');
                } else {
                    this.startTimer();
                    this.startWPMTracking();
                    this.typingInput.disabled = false;
                    this.typingInput.focus();
                    this.pauseBtn.textContent = 'Pause';
                }
            }

            startTimer() {
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.timerDisplay.textContent = this.timeLeft;
                    
                    if (this.timeLeft <= 0) {
                        this.endTest();
                    }
                }, 1000);
            }

            startWPMTracking() {
                this.wpmTimer = setInterval(() => {
                    this.calculateStats();
                    this.updateChart();
                }, 1000);
            }

            handleKeyDown(e) {
                if (!this.isActive || this.isPaused) return;
                
                if (e.key === 'Backspace' && this.currentIndex > 0) {
                    this.currentIndex--;
                    this.streak = 0;
                    this.updateDisplay();
                    this.updateProgress();
                }
            }

            handleTyping(e) {
                if (!this.isActive || this.isPaused) return;
                
                const typedText = e.target.value;
                const typedChar = typedText[typedText.length - 1];
                
                if (typedChar && this.currentIndex < this.currentSentence.length) {
                    this.totalChars++;
                    
                    if (typedChar === this.currentSentence[this.currentIndex]) {
                        this.correctChars++;
                        this.streak++;
                        this.markCharacter(this.currentIndex, 'correct');
                        this.sounds.correct();
                        
                        if (this.streak > this.bestStreak) {
                            this.bestStreak = this.streak;
                        }
                        
                        this.checkAchievements();
                    } else {
                        this.errors++;
                        this.streak = 0;
                        this.markCharacter(this.currentIndex, 'incorrect');
                        this.sounds.incorrect();
                    }
                    
                    this.currentIndex++;
                    this.updateDisplay();
                    this.updateProgress();
                    this.calculateStats();
                    this.updateLevel();
                    
                    if (this.currentIndex >= this.currentSentence.length) {
                        this.wordsTyped += this.currentSentence.split(' ').length;
                        this.loadNewSentence();
                        this.typingInput.value = '';
                        this.sounds.complete();
                    }
                }
            }

            markCharacter(index, status) {
                const char = document.querySelector(`[data-index="${index}"]`);
                if (char) {
                    char.className = `char ${status}`;
                }
            }

            updateDisplay() {
                const chars = document.querySelectorAll('.char');
                chars.forEach((char, index) => {
                    char.classList.remove('current');
                    if (index === this.currentIndex) {
                        char.classList.add('current');
                    }
                });
                
                this.streakDisplay.textContent = this.streak;
                
                if (this.streak >= 10) {
                    this.comboDisplay.textContent = `Perfect Streak: ${this.streak}`;
                    this.comboDisplay.classList.add('show');
                } else {
                    this.comboDisplay.classList.remove('show');
                }
            }

            updateProgress() {
                const progress = (this.currentIndex / this.currentSentence.length) * 100;
                this.progressFill.style.width = progress + '%';
            }

            calculateStats() {
                const timeElapsed = (Date.now() - this.startTime) / 1000 / 60;
                const wordsTyped = this.correctChars / 5;
                const wpm = Math.round(wordsTyped / timeElapsed) || 0;
                const accuracy = this.totalChars > 0 ? Math.round((this.correctChars / this.totalChars) * 100) : 100;
                
                this.wpmDisplay.textContent = wpm;
                this.accuracyDisplay.textContent = accuracy + '%';
                this.wordsDisplay.textContent = this.wordsTyped;
                
                this.wpmHistory.push(wpm);
            }

            updateLevel() {
                const newLevel = Math.floor(this.correctChars / 100) + 1;
                if (newLevel > this.level) {
                    this.level = newLevel;
                    this.levelDisplay.textContent = this.level;
                    this.showAchievement(`Level ${this.level} Reached!`);
                    this.sounds.achievement();
                }
            }

            updateChart() {
                if (this.wpmHistory.length < 2) return;
                
                const maxWpm = Math.max(...this.wpmHistory);
                const points = this.wpmHistory.map((wpm, index) => {
                    const x = (index / (this.wpmHistory.length - 1)) * 400;
                    const y = 150 - (wpm / maxWpm) * 120;
                    return `${x},${y}`;
                }).join(' ');
                
                this.chartLine.setAttribute('d', `M${points.split(' ').join(' L')}`);
                this.chartArea.setAttribute('d', `M0,150 L${points.split(' ').join(' L')} L400,150 Z`);
            }

            checkAchievements() {
                const achievements = [];
                
                if (this.streak === 50) achievements.push('Speed Demon - 50 Perfect Streak!');
                if (this.streak === 100) achievements.push('Typing Master - 100 Perfect Streak!');
                if (this.correctChars === 500) achievements.push('Milestone - 500 Characters!');
                if (this.correctChars === 1000) achievements.push('Champion - 1000 Characters!');
                
                const currentWpm = parseInt(this.wpmDisplay.textContent);
                if (currentWpm === 60) achievements.push('Speed Racer - 60 WPM!');
                if (currentWpm === 80) achievements.push('Lightning Fingers - 80 WPM!');
                if (currentWpm === 100) achievements.push('Typing Legend - 100 WPM!');
                
                achievements.forEach(achievement => {
                    if (!this.achievements.includes(achievement)) {
                        this.achievements.push(achievement);
                        this.showAchievement(achievement);
                        this.sounds.achievement();
                    }
                });
            }

            showAchievement(text) {
                this.achievementNotification.textContent = text;
                this.achievementNotification.classList.add('show');
                setTimeout(() => {
                    this.achievementNotification.classList.remove('show');
                }, 3000);
            }

            endTest() {
                this.isActive = false;
                this.isPaused = false;
                clearInterval(this.timer);
                clearInterval(this.wpmTimer);
                this.typingInput.disabled = true;
                this.startBtn.textContent = 'Start Test';
                this.startBtn.disabled = false;
                this.pauseBtn.disabled = true;
                this.pauseBtn.textContent = 'Pause';
                
                this.saveScore();
                this.showResults();
                this.sounds.complete();
            }

            saveScore() {
                const score = {
                    wpm: parseInt(this.wpmDisplay.textContent),
                    accuracy: parseInt(this.accuracyDisplay.textContent),
                    words: this.wordsTyped,
                    streak: this.bestStreak,
                    level: this.level,
                    difficulty: this.difficulty,
                    mode: this.gameMode,
                    date: new Date().toLocaleDateString()
                };
                
                this.personalBests.push(score);
                this.personalBests.sort((a, b) => b.wpm - a.wpm);
                this.personalBests = this.personalBests.slice(0, 10);
                
                localStorage.setItem('typingBests', JSON.stringify(this.personalBests));
                this.updateLeaderboard();
            }

            updateLeaderboard() {
                this.leaderboardList.innerHTML = '';
                this.personalBests.forEach((score, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'leaderboard-entry';
                    entry.innerHTML = `
                        <span class="rank">#${index + 1}</span>
                        <span>${score.wpm} WPM</span>
                        <span>${score.accuracy}%</span>
                        <span>${score.difficulty}</span>
                        <span>${score.date}</span>
                    `;
                    this.leaderboardList.appendChild(entry);
                });
            }

            showResults() {
                const wpm = parseInt(this.wpmDisplay.textContent);
                const accuracy = parseInt(this.accuracyDisplay.textContent);
                
                document.getElementById('finalWpm').textContent = wpm;
                document.getElementById('finalAccuracy').textContent = accuracy + '%';
                document.getElementById('finalWords').textContent = this.wordsTyped;
                document.getElementById('finalStreak').textContent = this.bestStreak;
                document.getElementById('finalLevel').textContent = this.level;
                
                const rank = this.getRank(wpm, accuracy);
                document.getElementById('finalRank').textContent = rank;
                
                const message = this.getPerformanceMessage(wpm, accuracy);
                document.getElementById('performanceMessage').textContent = message;
                
                this.results.classList.add('show');
            }

            getRank(wpm, accuracy) {
                if (wpm >= 80 && accuracy >= 95) return 'S+';
                if (wpm >= 70 && accuracy >= 90) return 'S';
                if (wpm >= 60 && accuracy >= 85) return 'A+';
                if (wpm >= 50 && accuracy >= 80) return 'A';
                if (wpm >= 40 && accuracy >= 75) return 'B+';
                if (wpm >= 30 && accuracy >= 70) return 'B';
                if (wpm >= 20 && accuracy >= 65) return 'C+';
                return 'C';
            }

            getPerformanceMessage(wpm, accuracy) {
                if (wpm >= 80 && accuracy >= 95) return 'Absolutely phenomenal! You\'re a typing virtuoso! 🏆';
                if (wpm >= 70 && accuracy >= 90) return 'Outstanding performance! You\'re in the top tier! 🌟';
                if (wpm >= 60 && accuracy >= 85) return 'Excellent work! You\'re a skilled typist! 💪';
                if (wpm >= 50 && accuracy >= 80) return 'Great job! You\'re above average! 👍';
                if (wpm >= 40 && accuracy >= 75) return 'Good progress! Keep practicing! 📈';
                if (wpm >= 30 && accuracy >= 70) return 'Nice work! You\'re improving! 🎯';
                return 'Keep practicing! Every expert was once a beginner! 🌱';
            }

            shareScore() {
                const wpm = parseInt(this.wpmDisplay.textContent);
                const accuracy = parseInt(this.accuracyDisplay.textContent);
                const text = `I just achieved ${wpm} WPM with ${accuracy}% accuracy on TypeFlow Pro! 🚀 #TypingTest #TypeFlowPro`;
                
                if (navigator.share) {
                    navigator.share({
                        title: 'TypeFlow Pro Results',
                        text: text,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(text);
                    this.showAchievement('Score copied to clipboard!');
                }
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                this.soundToggle.textContent = this.soundEnabled ? '🔊 Sound' : '🔇 Silent';
                this.soundToggle.classList.toggle('active', this.soundEnabled);
            }

            toggleTheme() {
                this.darkMode = !this.darkMode;
                document.body.classList.toggle('dark-mode', this.darkMode);
                this.themeToggle.textContent = this.darkMode ? '☀️ Light Mode' : '🌙 Dark Mode';
                this.themeToggle.classList.toggle('active', this.darkMode);
            }

            resetTest() {
                this.isActive = false;
                this.isPaused = false;
                clearInterval(this.timer);
                clearInterval(this.wpmTimer);
                this.correctChars = 0;
                this.totalChars = 0;
                this.errors = 0;
                this.wordsTyped = 0;
                this.streak = 0;
                this.bestStreak = 0;
                this.level = 1;
                this.currentIndex = 0;
                this.startTime = null;
                this.wpmHistory = [];
                
                this.typingInput.disabled = true;
                this.typingInput.value = '';
                this.startBtn.textContent = 'Start Test';
                this.startBtn.disabled = false;
                this.pauseBtn.disabled = true;
                this.pauseBtn.textContent = 'Pause';
                
                this.updateModeSettings();
                this.wpmDisplay.textContent = '0';
                this.accuracyDisplay.textContent = '100%';
                this.wordsDisplay.textContent = '0';
                this.streakDisplay.textContent = '0';
                this.levelDisplay.textContent = '1';
                this.progressFill.style.width = '0%';
                this.comboDisplay.classList.remove('show');
                this.results.classList.remove('show');
                
                this.loadNewSentence();
                this.chartLine.setAttribute('d', 'M0,150');
                this.chartArea.setAttribute('d', 'M0,150 L0,150 L400,150 Z');
            }
        }

        // Initialize the typing speed test
        document.addEventListener('DOMContentLoaded', () => {
            new TypingSpeedTest();
        });
    </script>
</body>
