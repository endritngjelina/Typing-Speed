<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster Pro - Advanced Typing Speed Test</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 900px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .test-area {
            margin-bottom: 30px;
        }

        .text-display {
            background: #f8f9ff;
            border: 2px solid #e8ecff;
            border-radius: 15px;
            padding: 30px;
            font-size: 1.3em;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            min-height: 120px;
            position: relative;
            overflow: hidden;
        }

        .text-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 49%, rgba(102, 126, 234, 0.05) 50%, transparent 51%);
            pointer-events: none;
        }

        .char {
            position: relative;
            transition: all 0.15s ease;
        }

        .char.correct {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }

        .char.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: #c62828;
        }

        .char.current {
            animation: blink 1s infinite;
            background: rgba(102, 126, 234, 0.3);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .input-area {
            position: relative;
        }

        .typing-input {
            width: 100%;
            padding: 20px;
            font-size: 1.2em;
            border: 3px solid #e8ecff;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.9);
        }

        .typing-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        .typing-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .progress-bar {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .results {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-top: 30px;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.5s ease;
        }

        .results.show {
            transform: scale(1);
            opacity: 1;
        }

        .results h2 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.2em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .result-item {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .result-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-label {
            color: #666;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden {
            display: none;
        }

        .timer {
            font-size: 1.5em;
            font-weight: 600;
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }

        .wpm-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .logo {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="floating-particles"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-keyboard"></i> TypeMaster Pro
            </div>
            <div class="subtitle">Professional Typing Speed Assessment</div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="errors">0</div>
                <div class="stat-label">Errors</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="time">60</div>
                <div class="stat-label">Time (s)</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="test-area">
            <div class="text-display" id="textDisplay">
                <div class="wpm-indicator">Live WPM: <span id="liveWpm">0</span></div>
                <div id="textContent"></div>
            </div>
            <div class="input-area">
                <input type="text" class="typing-input" id="typingInput" placeholder="Click here and start typing when ready..." disabled>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">
                <i class="fas fa-play"></i> Start Test
            </button>
            <button class="btn btn-secondary" id="resetBtn">
                <i class="fas fa-redo"></i> Reset
            </button>
        </div>

        <div class="results hidden" id="results">
            <h2><i class="fas fa-trophy"></i> Test Results</h2>
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-value" id="finalWpm">0</div>
                    <div class="result-label">Words Per Minute</div>
                </div>
                <div class="result-item">
                    <div class="result-value" id="finalAccuracy">0%</div>
                    <div class="result-label">Accuracy</div>
                </div>
                <div class="result-item">
                    <div class="result-value" id="finalErrors">0</div>
                    <div class="result-label">Total Errors</div>
                </div>
                <div class="result-item">
                    <div class="result-value" id="finalTime">0s</div>
                    <div class="result-label">Time Taken</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TypingSpeedTest {
            constructor() {
                this.sampleTexts = [
                    "The quick brown fox jumps over the lazy dog. This pangram contains every letter of the alphabet at least once, making it perfect for testing typing skills and keyboard functionality.",
                    "In the rapidly evolving world of technology, software developers must continuously adapt to new frameworks, programming languages, and development methodologies to remain competitive in the industry.",
                    "Artificial intelligence and machine learning are revolutionizing the way we interact with computers, process data, and solve complex problems across various industries and domains.",
                    "The art of programming requires not only technical skills but also logical thinking, problem-solving abilities, and the patience to debug and optimize code for better performance.",
                    "Cloud computing has transformed the way businesses operate, enabling scalable solutions, remote collaboration, and cost-effective infrastructure management for organizations worldwide.",
                    "Cybersecurity has become increasingly important as digital threats evolve, requiring sophisticated defense mechanisms, employee training, and continuous monitoring of network activities.",
                    "Data science combines statistics, programming, and domain expertise to extract meaningful insights from large datasets, driving informed decision-making in modern organizations.",
                    "User experience design focuses on creating intuitive, accessible, and enjoyable interfaces that meet user needs while achieving business objectives through thoughtful design principles."
                ];
                
                this.currentText = '';
                this.currentIndex = 0;
                this.startTime = null;
                this.endTime = null;
                this.timer = null;
                this.timeLimit = 60;
                this.timeElapsed = 0;
                this.errors = 0;
                this.isTestActive = false;
                
                this.initializeElements();
                this.initializeEventListeners();
                this.createFloatingParticles();
                this.resetTest();
            }

            initializeElements() {
                this.textDisplay = document.getElementById('textContent');
                this.typingInput = document.getElementById('typingInput');
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.results = document.getElementById('results');
                this.progressFill = document.getElementById('progressFill');
                
                // Stats elements
                this.wpmDisplay = document.getElementById('wpm');
                this.accuracyDisplay = document.getElementById('accuracy');
                this.errorsDisplay = document.getElementById('errors');
                this.timeDisplay = document.getElementById('time');
                this.liveWpmDisplay = document.getElementById('liveWpm');
                
                // Final results elements
                this.finalWpm = document.getElementById('finalWpm');
                this.finalAccuracy = document.getElementById('finalAccuracy');
                this.finalErrors = document.getElementById('finalErrors');
                this.finalTime = document.getElementById('finalTime');
            }

            initializeEventListeners() {
                this.startBtn.addEventListener('click', () => this.startTest());
                this.resetBtn.addEventListener('click', () => this.resetTest());
                this.typingInput.addEventListener('input', (e) => this.handleTyping(e));
                this.typingInput.addEventListener('keydown', (e) => this.handleKeyDown(e));
                
                // Prevent context menu on right click
                this.typingInput.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            createFloatingParticles() {
                const particlesContainer = document.querySelector('.floating-particles');
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 6 + 's';
                    particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    particlesContainer.appendChild(particle);
                }
            }

            getRandomText() {
                const randomIndex = Math.floor(Math.random() * this.sampleTexts.length);
                return this.sampleTexts[randomIndex];
            }

            displayText() {
                this.currentText = this.getRandomText();
                this.textDisplay.innerHTML = this.currentText
                    .split('')
                    .map((char, index) => `<span class="char" data-index="${index}">${char}</span>`)
                    .join('');
            }

            startTest() {
                this.isTestActive = true;
                this.startTime = Date.now();
                this.timeElapsed = 0;
                this.currentIndex = 0;
                this.errors = 0;
                
                this.typingInput.disabled = false;
                this.typingInput.focus();
                this.typingInput.value = '';
                
                this.startBtn.disabled = true;
                this.startBtn.innerHTML = '<i class="fas fa-clock"></i> Test in Progress';
                
                this.results.classList.add('hidden');
                this.updateCurrentChar();
                this.startTimer();
                
                // Add subtle animation to text display
                this.textDisplay.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    this.textDisplay.style.transform = 'scale(1)';
                }, 200);
            }

            startTimer() {
                this.timer = setInterval(() => {
                    this.timeElapsed++;
                    const timeLeft = this.timeLimit - this.timeElapsed;
                    
                    if (timeLeft <= 0) {
                        this.endTest();
                        return;
                    }
                    
                    this.timeDisplay.textContent = timeLeft;
                    this.updateProgress();
                    this.updateStats();
                }, 1000);
            }

            updateProgress() {
                const progress = (this.timeElapsed / this.timeLimit) * 100;
                this.progressFill.style.width = progress + '%';
                
                // Change color based on progress
                if (progress > 80) {
                    this.progressFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a24)';
                } else if (progress > 60) {
                    this.progressFill.style.background = 'linear-gradient(90deg, #feca57, #ff9ff3)';
                } else {
                    this.progressFill.style.background = 'linear-gradient(90deg, #667eea, #764ba2)';
                }
            }

            handleTyping(e) {
                if (!this.isTestActive) return;
                
                const typedText = e.target.value;
                const typedLength = typedText.length;
                
                // Reset character states
                document.querySelectorAll('.char').forEach(char => {
                    char.classList.remove('correct', 'incorrect', 'current');
                });
                
                // Check each character
                for (let i = 0; i < typedLength; i++) {
                    const char = document.querySelector(`[data-index="${i}"]`);
                    if (char) {
                        if (typedText[i] === this.currentText[i]) {
                            char.classList.add('correct');
                        } else {
                            char.classList.add('incorrect');
                        }
                    }
                }
                
                // Update current character
                this.currentIndex = typedLength;
                this.updateCurrentChar();
                
                // Check if test is complete
                if (typedLength === this.currentText.length) {
                    this.endTest();
                }
                
                this.updateStats();
            }

            handleKeyDown(e) {
                if (!this.isTestActive) return;
                
                // Prevent certain keys
                if (e.key === 'Tab' || e.key === 'Escape') {
                    e.preventDefault();
                }
            }

            updateCurrentChar() {
                const currentChar = document.querySelector(`[data-index="${this.currentIndex}"]`);
                if (currentChar) {
                    currentChar.classList.add('current');
                }
            }

            updateStats() {
                if (!this.startTime) return;
                
                const timeElapsedMin = this.timeElapsed / 60;
                const typedText = this.typingInput.value;
                const wordsTyped = typedText.trim().split(/\s+/).filter(word => word.length > 0).length;
                
                // Calculate WPM
                const wpm = timeElapsedMin > 0 ? Math.round(wordsTyped / timeElapsedMin) : 0;
                
                // Calculate errors
                let currentErrors = 0;
                for (let i = 0; i < typedText.length; i++) {
                    if (typedText[i] !== this.currentText[i]) {
                        currentErrors++;
                    }
                }
                
                // Calculate accuracy
                const accuracy = typedText.length > 0 ? 
                    Math.round(((typedText.length - currentErrors) / typedText.length) * 100) : 100;
                
                // Update displays
                this.wpmDisplay.textContent = wpm;
                this.liveWpmDisplay.textContent = wpm;
                this.accuracyDisplay.textContent = accuracy + '%';
                this.errorsDisplay.textContent = currentErrors;
                this.errors = currentErrors;
                
                // Add visual feedback for WPM milestones
                if (wpm >= 60) {
                    this.liveWpmDisplay.style.color = '#27ae60';
                } else if (wpm >= 40) {
                    this.liveWpmDisplay.style.color = '#f39c12';
                } else {
                    this.liveWpmDisplay.style.color = '#667eea';
                }
            }

            endTest() {
                this.isTestActive = false;
                this.endTime = Date.now();
                
                clearInterval(this.timer);
                this.typingInput.disabled = true;
                
                this.startBtn.disabled = false;
                this.startBtn.innerHTML = '<i class="fas fa-play"></i> Start Test';
                
                this.displayResults();
            }

            displayResults() {
                const typedText = this.typingInput.value;
                const timeElapsedMin = this.timeElapsed / 60;
                const wordsTyped = typedText.trim().split(/\s+/).filter(word => word.length > 0).length;
                
                const wpm = timeElapsedMin > 0 ? Math.round(wordsTyped / timeElapsedMin) : 0;
                const accuracy = typedText.length > 0 ? 
                    Math.round(((typedText.length - this.errors) / typedText.length) * 100) : 100;
                
                // Update final results
                this.finalWpm.textContent = wpm;
                this.finalAccuracy.textContent = accuracy + '%';
                this.finalErrors.textContent = this.errors;
                this.finalTime.textContent = this.timeElapsed + 's';
                
                // Show results with animation
                this.results.classList.remove('hidden');
                setTimeout(() => {
                    this.results.classList.add('show');
                }, 100);
                
                // Add performance feedback
                this.addPerformanceFeedback(wpm, accuracy);
            }

            addPerformanceFeedback(wpm, accuracy) {
                let performance = '';
                let color = '#667eea';
                
                if (wpm >= 70 && accuracy >= 95) {
                    performance = 'Exceptional!';
                    color = '#27ae60';
                } else if (wpm >= 50 && accuracy >= 90) {
                    performance = 'Excellent!';
                    color = '#2ecc71';
                } else if (wpm >= 40 && accuracy >= 85) {
                    performance = 'Good!';
                    color = '#f39c12';
                } else if (wpm >= 30 && accuracy >= 80) {
                    performance = 'Average';
                    color = '#e67e22';
                } else {
                    performance = 'Keep Practicing!';
                    color = '#e74c3c';
                }
                
                const resultsTitle = document.querySelector('.results h2');
                resultsTitle.innerHTML = `<i class="fas fa-trophy"></i> ${performance} - Test Results`;
                resultsTitle.style.color = color;
            }

            resetTest() {
                this.isTestActive = false;
                this.currentIndex = 0;
                this.errors = 0;
                this.timeElapsed = 0;
                
                clearInterval(this.timer);
                
                this.typingInput.disabled = true;
                this.typingInput.value = '';
                
                this.startBtn.disabled = false;
                this.startBtn.innerHTML = '<i class="fas fa-play"></i> Start Test';
                
                this.results.classList.remove('show');
                this.results.classList.add('hidden');
                
                // Reset stats
                this.wpmDisplay.textContent = '0';
                this.accuracyDisplay.textContent = '100%';
                this.errorsDisplay.textContent = '0';
                this.timeDisplay.textContent = '60';
                this.liveWpmDisplay.textContent = '0';
                
                // Reset progress
                this.progressFill.style.width = '0%';
                this.progressFill.style.background = 'linear-gradient(90deg, #667eea, #764ba2)';
                
                // Display new text
                this.displayText();
            }
        }

        // Initialize the typing test when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new TypingSpeedTest();
        });
    </script>
</body>
</html>
